<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Pilotes Academy</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-dot"></div>
      <span class="login-logo-text">Pilotes Academy</span>
    </div>
    <div class="login-title">Connexion</div>
    <div class="login-sub">Skill Tracker — Espace interne</div>

    <div id="error-msg" class="error-msg"></div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="email">Adresse email</label>
        <input class="form-input" type="email" id="email" placeholder="prenom@les-pilotes.fr" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Mot de passe</label>
        <input class="form-input" type="password" id="password" placeholder="••••••••" required>
      </div>
      <button class="btn btn-primary btn-lg" type="submit" id="submit-btn" style="width:100%;justify-content:center;margin-top:8px">
        Se connecter
      </button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
  redirectIfAuth();

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('submit-btn');
    const errEl = document.getElementById('error-msg');

    btn.disabled = true;
    btn.textContent = 'Connexion...';
    errEl.classList.remove('show');

    const { data, error } = await db.auth.signInWithPassword({ email, password });

    if (error) {
      errEl.textContent = 'Email ou mot de passe incorrect.';
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Se connecter';
      return;
    }

    // Fetch profile to route correctly
    const { data: profile } = await db
      .from('profiles')
      .select('*')
      .eq('id', data.user.id)
      .single();

    if (!profile) {
      errEl.textContent = 'Compte non configuré. Contactez un administrateur.';
      errEl.classList.add('show');
      await db.auth.signOut();
      btn.disabled = false;
      btn.textContent = 'Se connecter';
      return;
    }

    if (profile.role === 'manager') {
      window.location.href = '/dashboard.html';
    } else {
      window.location.href = `/person.html?id=${profile.person_id}`;
    }
  });
</script>
</body>
</html>
