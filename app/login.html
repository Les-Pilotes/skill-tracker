<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Pilotes Academy</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
<a class="skip-link" href="#main">Aller au contenu</a>
<div class="login-page">
  <main id="main" class="login-card">
    <div class="login-logo" aria-hidden="true">
      <img src="logo.png" alt="" style="width:48px;height:48px;border-radius:50%;object-fit:cover;">
      <span class="login-logo-text">Pilotes Academy</span>
    </div>
    <h1 class="login-title">Connexion</h1>
    <p class="login-sub">Skill Tracker — Espace interne</p>

    <div id="error-msg" class="error-msg" role="alert" aria-live="polite"></div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Adresse email</label>
        <input class="form-input" type="email" id="email" placeholder="prenom@les-pilotes.fr"
          autocomplete="email" required autofocus aria-required="true">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Mot de passe</label>
        <div class="input-wrapper">
          <input class="form-input" type="password" id="password" placeholder="••••••••"
            autocomplete="current-password" required aria-required="true">
          <button type="button" class="input-toggle" id="pw-toggle" aria-label="Afficher le mot de passe" aria-pressed="false">👁</button>
        </div>
      </div>
      <button class="btn btn-primary btn-lg" type="submit" id="submit-btn" style="width:100%;justify-content:center;margin-top:8px">
        Se connecter
      </button>
    </form>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
  // Password visibility toggle
  document.getElementById('pw-toggle').addEventListener('click', function() {
    const pw = document.getElementById('password');
    const show = pw.type === 'password';
    pw.type = show ? 'text' : 'password';
    this.textContent = show ? '🙈' : '👁';
    this.setAttribute('aria-pressed', show);
    this.setAttribute('aria-label', show ? 'Masquer le mot de passe' : 'Afficher le mot de passe');
  });

  redirectIfAuth();

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('submit-btn');
    const errEl = document.getElementById('error-msg');

    btn.disabled = true;
    btn.textContent = 'Connexion...';
    errEl.classList.remove('show');

    const { data, error } = await db.auth.signInWithPassword({ email, password });

    if (error) {
      errEl.textContent = 'Email ou mot de passe incorrect.';
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Se connecter';
      return;
    }

    // Fetch profile to route correctly
    const { data: profile } = await db
      .from('profiles')
      .select('*')
      .eq('id', data.user.id)
      .single();

    if (!profile) {
      errEl.textContent = 'Compte non configuré. Contactez un administrateur.';
      errEl.classList.add('show');
      await db.auth.signOut();
      btn.disabled = false;
      btn.textContent = 'Se connecter';
      return;
    }

    if (profile.role === 'manager') {
      window.location.href = '/dashboard.html';
    } else {
      window.location.href = `/person.html?id=${profile.person_id}`;
    }
  });
</script>
</body>
</html>
