<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profil — Pilotes Academy</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
<a class="skip-link" href="#main">Aller au contenu</a>

<nav class="navbar" aria-label="Navigation principale">
  <div class="navbar-inner">
    <div class="navbar-brand">
      <img src="logo.png" alt="Les Pilotes" style="width:28px;height:28px;border-radius:50%;object-fit:cover;">
      Pilotes Academy
    </div>
    <div class="navbar-nav" id="manager-nav" style="display:none">
      <a href="dashboard.html">Tableau de bord</a>
      <a href="admin.html">Membres</a>
    </div>
    <div class="navbar-right">
      <div class="user-chip" id="nav-user"></div>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Déconnexion</button>
    </div>
  </div>
</nav>

<main id="main" class="page-wrap">
  <div id="main-content">
    <div class="loading"><div class="spinner"></div> Chargement...</div>
  </div>
</main>

<!-- Modal: Gérer les compétences -->
<div class="modal-overlay" id="skills-modal" role="dialog" aria-modal="true" aria-labelledby="skills-modal-title">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="skills-modal-title">Gérer les compétences</div>
      <button class="modal-close" onclick="closeModal('skills-modal')" aria-label="Fermer">×</button>
    </div>
    <div class="skills-list" id="skills-list-modal"></div>
    <div class="add-skill-row">
      <label for="new-skill-input" class="sr-only">Nouvelle compétence</label>
      <input type="text" id="new-skill-input" placeholder="Nouvelle compétence..." maxlength="50">
      <button class="btn btn-primary btn-sm" onclick="addSkill()">Ajouter</button>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('skills-modal')">Fermer</button>
    </div>
  </div>
</div>

<!-- Modal: Confirmer envoi email -->
<div class="modal-overlay" id="email-modal" role="dialog" aria-modal="true" aria-labelledby="email-modal-title">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="email-modal-title">Envoyer le bilan</div>
      <button class="modal-close" onclick="closeModal('email-modal')" aria-label="Fermer">×</button>
    </div>
    <p style="font-size:14px;color:var(--text-muted);margin-bottom:16px" id="email-modal-body"></p>

    <div class="form-group">
      <label class="form-label">Cc</label>
      <div id="cc-list" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px"></div>
      <div style="display:flex;gap:8px">
        <input type="email" class="form-input" id="cc-input" placeholder="Ajouter une adresse email..." style="flex:1">
        <button class="btn btn-secondary btn-sm" onclick="addCc()">+</button>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('email-modal')">Annuler</button>
      <button class="btn btn-primary" id="email-confirm-btn">Envoyer</button>
    </div>
  </div>
</div>
<div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
let currentPersonId = null;
let currentPerson = null;
let currentProfile = null;
let allSkills = [];
let allEvals = [];
let radarChart = null;
let lineChart = null;
let editingEvalId = null;
let editingScores = {};

const params = new URLSearchParams(location.search);
currentPersonId = params.get('id');

(async () => {
  const auth = await requireAuth();
  if (!auth) return;
  currentProfile = auth.profile;

  // Stagiaires can only see their own profile
  if (auth.profile.role === 'stagiaire' && auth.profile.person_id !== currentPersonId) {
    window.location.href = `/person.html?id=${auth.profile.person_id}`;
    return;
  }

  if (auth.profile.role === 'manager') {
    document.getElementById('manager-nav').style.display = 'flex';
  }

  renderNavUser(auth.user, auth.profile);
  await loadProfile();
})();

async function loadProfile() {
  const content = document.getElementById('main-content');

  // Load person
  const { data: person, error } = await db.from('people').select('*').eq('id', currentPersonId).single();
  if (error || !person) {
    content.innerHTML = '<div class="empty-state"><div class="empty-state-title">Membre introuvable</div></div>';
    return;
  }
  currentPerson = person;

  // Load skills
  const { data: skills } = await db.from('skills').select('*').eq('person_id', currentPersonId).order('name');
  allSkills = skills || [];

  // Load evaluations with scores
  const { data: evals } = await db
    .from('evaluations')
    .select('*, evaluation_scores(*, skills(name))')
    .eq('person_id', currentPersonId)
    .order('created_at', { ascending: true });
  allEvals = evals || [];

  renderProfile(person);
}

function renderProfile(person) {
  const isManager = currentProfile.role === 'manager';
  const initials = getInitials(person.name);
  const latestEval = allEvals[allEvals.length - 1];
  const prevEval   = allEvals[allEvals.length - 2];

  let avgScore = '—';
  if (latestEval?.evaluation_scores?.length) {
    const scores = latestEval.evaluation_scores.map(s => s.score);
    avgScore = (scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1);
  }

  const managerActions = isManager ? `
    <div class="profile-actions">
      <button class="btn btn-secondary btn-sm" onclick="openModal('skills-modal');loadSkillsModal()">Compétences</button>
      <a href="evaluation-new.html?person=${currentPersonId}" class="btn btn-primary btn-sm">+ Nouvelle évaluation</a>
      ${latestEval ? `<button class="btn btn-secondary btn-sm" onclick="openEmailModal('${latestEval.id}')">Envoyer le bilan</button>` : ''}
    </div>` : '';

  document.getElementById('main-content').innerHTML = `
    <a class="back-link" href="${currentProfile.role==='manager'?'dashboard.html':'#'}">
      ${currentProfile.role==='manager'?'← Tableau de bord':''}
    </a>

    <div class="profile-header">
      <div class="avatar avatar-lg" style="background:${person.color}">${initials}</div>
      <div class="profile-info">
        <div class="profile-name">${person.name}</div>
        <div class="profile-meta">
          ${person.role}
          ${person.start_date ? ' · Depuis le ' + formatDate(person.start_date) : ''}
          ${person.email ? ` · ${person.email}` : ''}
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <span class="score-badge" style="font-size:14px;padding:6px 16px">${avgScore !== '—' ? avgScore + ' / 5' : 'Aucune évaluation'}</span>
        ${managerActions}
      </div>
    </div>

    ${allEvals.length === 0 ? `
      <div class="empty-state">
        <div class="empty-state-icon">📊</div>
        <div class="empty-state-title">Aucune évaluation</div>
        <div class="empty-state-desc">
          ${isManager ? '<a href="evaluation-new.html?person='+currentPersonId+'" class="btn btn-primary" style="margin-top:16px">Créer la première évaluation</a>' : 'Aucune évaluation disponible pour l\'instant.'}
        </div>
      </div>` : `
      <div class="charts-grid">
        <div class="chart-card">
          <div class="chart-title">Radar des compétences</div>
          <div class="chart-wrap"><canvas id="radar-chart"></canvas></div>
          <div class="chart-legend" id="radar-legend"></div>
        </div>
        <div class="chart-card">
          <div class="chart-title">Évolution dans le temps</div>
          <div class="chart-wrap"><canvas id="line-chart"></canvas></div>
        </div>
      </div>

      <div class="card" style="margin-bottom:20px">
        <div class="tabs">
          <button class="tab-btn active" onclick="switchTab('evals')">Évaluations (${allEvals.length})</button>
        </div>
        <div class="tab-panel active" id="tab-evals">
          <div class="eval-list" id="eval-list"></div>
        </div>
      </div>
    `}
  `;

  if (allEvals.length > 0) {
    renderRadar(latestEval, prevEval, person.color);
    renderLineChart(person.color);
    renderEvalList();
  }
}

function renderRadar(current, prev, color) {
  const labels = allSkills.map(s => s.name);
  const currentScores = labels.map(label => {
    const score = current?.evaluation_scores?.find(s => s.skills?.name === label);
    return score ? score.score : 0;
  });
  const prevScores = prev ? labels.map(label => {
    const score = prev?.evaluation_scores?.find(s => s.skills?.name === label);
    return score ? score.score : 0;
  }) : null;

  const valueLabelPlugin = {
    id: 'valueLabels',
    afterDatasetsDraw(chart) {
      const ctx = chart.ctx;
      // Show labels only for the current evaluation dataset (index 1 if prev exists, else 0)
      const dsIdx = prevScores ? 2 : 1;
      const meta = chart.getDatasetMeta(dsIdx);
      if (!meta?.data?.length) return;
      meta.data.forEach((point, i) => {
        if (!currentScores[i]) return;
        ctx.save();
        ctx.font = '500 11px sans-serif';
        ctx.fillStyle = color;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const angle = point.angle - Math.PI / 2;
        const offset = 16;
        const x = point.x + Math.cos(angle) * offset;
        const y = point.y + Math.sin(angle) * offset;
        ctx.fillText(currentScores[i], x, y);
        ctx.restore();
      });
    }
  };

  const datasets = [
    { data: new Array(labels.length).fill(5), borderColor: 'rgba(136,135,128,0.2)', borderWidth: 1, borderDash: [4,4], pointRadius: 0, fill: false },
  ];

  if (prevScores) {
    datasets.push({
      label: 'Éval. précédente',
      data: prevScores,
      borderColor: hexToRgba(color, 0.3),
      borderWidth: 1.5,
      backgroundColor: hexToRgba(color, 0.05),
      pointBackgroundColor: hexToRgba(color, 0.3),
      pointRadius: 3,
      fill: true
    });
  }

  datasets.push({
    label: 'Éval. actuelle',
    data: currentScores,
    borderColor: color,
    borderWidth: 2,
    backgroundColor: hexToRgba(color, 0.15),
    pointBackgroundColor: color,
    pointRadius: 5,
    pointHoverRadius: 7,
    fill: true
  });

  const ctx = document.getElementById('radar-chart');
  ctx.setAttribute('role', 'img');
  ctx.setAttribute('aria-label', `Radar des compétences de ${currentPerson?.name || ''} — ${labels.map((l, i) => l + ' : ' + (currentScores[i] || 0)).join(', ')}`);
  if (radarChart) radarChart.destroy();
  radarChart = new Chart(ctx, {
    type: 'radar',
    plugins: [valueLabelPlugin],
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: c => ` ${c.raw} / 5` } } },
      scales: { r: {
        min: 0, max: 5,
        ticks: { stepSize: 1, color: '#888780', font: { size: 10 }, backdropColor: 'transparent' },
        grid: { color: 'rgba(0,0,0,0.07)' },
        angleLines: { color: 'rgba(0,0,0,0.07)' },
        pointLabels: { color: '#5F5E5A', font: { size: 11 } }
      }}
    }
  });

  // Legend
  const legend = document.getElementById('radar-legend');
  if (legend) {
    legend.innerHTML = `
      <div class="legend-item">
        <span class="legend-dot" style="background:${color}"></span> Évaluation actuelle
      </div>
      ${prevScores ? `<div class="legend-item"><span class="legend-dot" style="background:${hexToRgba(color, 0.3)}"></span> Évaluation précédente</div>` : ''}
      <div class="legend-item">
        <span class="legend-dot" style="background:rgba(136,135,128,0.3);border:1.5px dashed rgba(136,135,128,0.6)"></span> Maximum (5)
      </div>`;
  }
}

function renderLineChart(color) {
  const skillNames = allSkills.map(s => s.name);
  const labels = allEvals.map(e => formatDateShort(e.created_at));

  const palette = [color, '#3D6ECC', '#2D7A4F', '#8B3A8B', '#C0392B', '#16758A', '#E07B39', '#5B6BA9', '#7B8C3A', '#A03060', '#BA7517'];

  const datasets = skillNames.map((skillName, i) => ({
    label: skillName,
    data: allEvals.map(ev => {
      const s = ev.evaluation_scores?.find(sc => sc.skills?.name === skillName);
      return s ? s.score : null;
    }),
    borderColor: palette[i % palette.length],
    backgroundColor: 'transparent',
    borderWidth: 1.5,
    pointRadius: 3,
    tension: 0.3,
    spanGaps: true
  }));

  const ctx = document.getElementById('line-chart');
  ctx.setAttribute('role', 'img');
  ctx.setAttribute('aria-label', `Évolution des compétences dans le temps — ${skillNames.join(', ')}`);
  if (lineChart) lineChart.destroy();
  lineChart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: true, position: 'bottom', labels: { font: { size: 11 }, boxWidth: 10, padding: 8 } }
      },
      scales: {
        y: { min: 0, max: 5, ticks: { stepSize: 1 }, grid: { color: 'rgba(0,0,0,0.05)' } },
        x: { grid: { display: false } }
      }
    }
  });
}

function renderEvalList() {
  const list = document.getElementById('eval-list');
  if (!list) return;

  const reversed = [...allEvals].reverse();
  const isManager = currentProfile.role === 'manager';

  list.innerHTML = reversed.map(ev => {
    const scores = ev.evaluation_scores || [];
    const avg = scores.length ? (scores.reduce((a,b)=>a+b.score,0)/scores.length).toFixed(1) : '—';

    if (editingEvalId === ev.id) return renderEvalEditForm(ev, scores);

    const scoresHtml = scores.map(s => `
      <div class="score-row">
        <span style="color:var(--text-muted)">${s.skills?.name || '—'}</span>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="score-dots">
            ${[1,2,3,4,5].map(n => `<div class="score-dot ${n<=s.score?'filled':'empty'}"></div>`).join('')}
          </div>
          <span style="font-weight:600;color:var(--accent);min-width:12px">${s.score}</span>
        </div>
      </div>
      ${s.comment ? `<div style="font-size:11px;color:var(--text-muted);padding-left:4px;margin-bottom:4px;font-style:italic">"${s.comment}"</div>` : ''}
    `).join('');

    return `
      <div class="eval-item">
        <div class="eval-item-header">
          <span class="eval-date">${formatDate(ev.created_at)}</span>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <span class="eval-avg">Moyenne : <strong>${avg}</strong> / 5</span>
            ${isManager ? `
              <button class="btn btn-secondary btn-sm" onclick="enterEditMode('${ev.id}')">Modifier</button>
              <button class="btn btn-secondary btn-sm" onclick="openEmailModal('${ev.id}')">Envoyer</button>
            ` : ''}
          </div>
        </div>
        <div class="eval-scores-grid">${scoresHtml}</div>
        ${ev.general_comment ? `<div class="eval-comment">💬 ${ev.general_comment}</div>` : ''}
      </div>`;
  }).join('');
}

function renderEvalEditForm(ev, scores) {
  const sorted = [...scores].sort((a, b) => (a.skills?.name || '').localeCompare(b.skills?.name || ''));
  const escape = (s) => (s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');

  const rows = sorted.map(s => {
    const data = editingScores[s.skill_id] || { score: s.score, comment: s.comment || '' };
    return `
      <div class="skill-row" style="border-bottom-color:rgba(186,117,23,0.2)">
        <div class="skill-name">${s.skills?.name || '—'}</div>
        <div class="score-input-group" role="group" aria-label="Note pour ${escape(s.skills?.name || '')}">
          ${[1,2,3,4,5].map(n => `
            <button class="score-btn ${data.score === n ? 'selected' : ''}"
              data-edit-skill="${s.skill_id}" data-score="${n}"
              onclick="setEditScore('${s.skill_id}', ${n})"
              aria-pressed="${data.score === n}" aria-label="${n} sur 5">${n}</button>
          `).join('')}
        </div>
        <div class="skill-comment">
          <input type="text" placeholder="Commentaire (optionnel)" maxlength="200"
            value="${escape(data.comment)}"
            oninput="setEditComment('${s.skill_id}', this.value)"
            aria-label="Commentaire pour ${escape(s.skills?.name || '')}">
        </div>
      </div>`;
  }).join('');

  return `
    <div class="eval-item" style="border-color:var(--accent);background:var(--accent-light)">
      <div class="eval-item-header">
        <span class="eval-date">✏️ Modifier l'évaluation du ${formatDate(ev.created_at)}</span>
        <div style="display:flex;align-items:center;gap:8px">
          <button class="btn btn-secondary btn-sm" onclick="exitEditMode()">Annuler</button>
          <button class="btn btn-primary btn-sm" id="save-edit-${ev.id}" onclick="saveEvalEdit('${ev.id}')">Enregistrer</button>
        </div>
      </div>
      <div style="margin-top:12px;background:var(--white);border-radius:var(--radius-sm);padding:4px 16px">${rows}</div>
      <div class="form-group" style="margin-top:16px;margin-bottom:0">
        <label class="form-label" for="edit-gc-${ev.id}">Commentaire général</label>
        <textarea class="form-input" id="edit-gc-${ev.id}" rows="3" maxlength="1000"
          placeholder="Bilan global...">${(ev.general_comment || '').replace(/</g, '&lt;')}</textarea>
      </div>
    </div>`;
}

function enterEditMode(evalId) {
  const ev = allEvals.find(e => e.id === evalId);
  if (!ev) return;
  editingEvalId = evalId;
  editingScores = {};
  (ev.evaluation_scores || []).forEach(s => {
    editingScores[s.skill_id] = { id: s.id, score: s.score, comment: s.comment || '' };
  });
  renderEvalList();
  document.getElementById(`save-edit-${evalId}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function exitEditMode() {
  editingEvalId = null;
  editingScores = {};
  renderEvalList();
}

function setEditScore(skillId, score) {
  if (editingScores[skillId]) editingScores[skillId].score = score;
  document.querySelectorAll(`[data-edit-skill="${skillId}"]`).forEach(btn => {
    const sel = parseInt(btn.dataset.score) === score;
    btn.classList.toggle('selected', sel);
    btn.setAttribute('aria-pressed', sel);
  });
}

function setEditComment(skillId, comment) {
  if (editingScores[skillId]) editingScores[skillId].comment = comment;
}

async function saveEvalEdit(evalId) {
  const btn = document.getElementById(`save-edit-${evalId}`);
  btn.disabled = true;
  btn.textContent = 'Enregistrement...';

  const generalComment = document.getElementById(`edit-gc-${evalId}`)?.value.trim() || null;
  const { error: eErr } = await db.from('evaluations')
    .update({ general_comment: generalComment })
    .eq('id', evalId);
  if (eErr) {
    toast('Erreur : ' + eErr.message, 'error');
    btn.disabled = false; btn.textContent = 'Enregistrer';
    return;
  }

  const updates = Object.values(editingScores).map(data =>
    db.from('evaluation_scores')
      .update({ score: data.score, comment: data.comment || null })
      .eq('id', data.id)
  );
  const results = await Promise.all(updates);
  const errs = results.filter(r => r.error);
  if (errs.length) {
    toast(`Erreur sur ${errs.length} note(s) : ${errs[0].error.message}`, 'error');
    btn.disabled = false; btn.textContent = 'Enregistrer';
    return;
  }

  toast('Évaluation modifiée ✓', 'success');
  editingEvalId = null;
  editingScores = {};
  await loadProfile();
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
}

// Skills modal
async function loadSkillsModal() {
  const list = document.getElementById('skills-list-modal');
  list.innerHTML = allSkills.map(s => `
    <div class="skill-chip">
      ${s.name}
      <button onclick="removeSkill('${s.id}','${s.name}')" title="Supprimer">×</button>
    </div>`).join('');
}

async function addSkill() {
  const input = document.getElementById('new-skill-input');
  const name = input.value.trim();
  if (!name) return;

  const { data, error } = await db.from('skills').insert({ person_id: currentPersonId, name }).select().single();
  if (error) { toast('Erreur lors de l\'ajout', 'error'); return; }

  allSkills.push(data);
  input.value = '';
  loadSkillsModal();
  toast('Compétence ajoutée');
}

async function removeSkill(id, name) {
  if (!confirm(`Supprimer la compétence "${name}" ?\nToutes les notes associées seront perdues.`)) return;
  const { error } = await db.from('skills').delete().eq('id', id);
  if (error) { toast('Erreur lors de la suppression', 'error'); return; }
  allSkills = allSkills.filter(s => s.id !== id);
  loadSkillsModal();
  toast('Compétence supprimée');
}

// CC management — saved contacts in localStorage
let ccList = ['amadou@les-pilotes.fr'];

function getSavedCcs() {
  try { return JSON.parse(localStorage.getItem('cc_contacts') || '[]'); } catch { return []; }
}

function saveCc(email) {
  const saved = getSavedCcs();
  if (!saved.includes(email) && email !== 'amadou@les-pilotes.fr') {
    saved.push(email);
    localStorage.setItem('cc_contacts', JSON.stringify(saved));
  }
}

function renderCcList() {
  const saved = getSavedCcs().filter(e => !ccList.includes(e));
  document.getElementById('cc-list').innerHTML = ccList.map((email, i) => `
    <span style="display:inline-flex;align-items:center;gap:5px;padding:3px 10px 3px 12px;background:var(--accent-light);border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--accent)">
      ${email}
      ${email !== 'amadou@les-pilotes.fr' ? `<button onclick="removeCc(${i})" style="background:none;border:none;cursor:pointer;color:var(--accent);font-size:14px;padding:0;line-height:1">×</button>` : ''}
    </span>`).join('')
  + (saved.length ? '<div style="width:100%;font-size:11px;color:var(--text-faint);margin-top:4px">Mémorisés :</div>'
    + saved.map(email => `
    <span onclick="addSavedCc('${email}')" style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;background:var(--bg);border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--text-muted);cursor:pointer" title="Ajouter">
      + ${email}
    </span>`).join('') : '');
}

function addSavedCc(email) {
  if (!ccList.includes(email)) ccList.push(email);
  renderCcList();
}

function addCc() {
  const input = document.getElementById('cc-input');
  const email = input.value.trim();
  if (!email || !email.includes('@')) return;
  if (!ccList.includes(email)) ccList.push(email);
  saveCc(email);
  input.value = '';
  renderCcList();
}

function removeCc(i) {
  ccList.splice(i, 1);
  renderCcList();
}

// Email modal
function openEmailModal(evalId) {
  const ev = allEvals.find(e => e.id === evalId);
  document.getElementById('email-modal-body').textContent =
    `Envoyer le bilan du ${formatDate(ev?.created_at)} à ${currentPerson?.email || currentPerson?.name}`;
  ccList = ['amadou@les-pilotes.fr'];
  renderCcList();
  document.getElementById('email-confirm-btn').onclick = () => sendEvalEmail(evalId);
  openModal('email-modal');
}

async function sendEvalEmail(evalId) {
  const btn = document.getElementById('email-confirm-btn');
  btn.disabled = true;
  btn.textContent = 'Envoi...';

  // Capture radar chart as base64 image
  let radarImage = null;
  if (radarChart) {
    try { radarImage = radarChart.toBase64Image('image/png', 1); } catch(e) {}
  }

  try {
    const { data, error } = await db.functions.invoke('send-evaluation', {
      body: { evaluation_id: evalId, cc: ccList, radar_image: radarImage }
    });
    if (error) throw new Error(error.message || 'Erreur serveur');
    if (data?.error) throw new Error(data.error);
    toast('Bilan envoyé par email ✓', 'success');
    closeModal('email-modal');
  } catch (e) {
    toast('Erreur lors de l\'envoi : ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Envoyer';
  }
}

document.getElementById('cc-input')?.addEventListener('keypress', e => {
  if (e.key === 'Enter') addCc();
});

function openModal(id) {
  const el = document.getElementById(id);
  el.classList.add('show');
  trapFocus(el);
}
function closeModal(id) {
  const el = document.getElementById(id);
  el.classList.remove('show');
  releaseFocus(el);
}

// Close modals on Escape key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    ['skills-modal', 'email-modal'].forEach(id => {
      if (document.getElementById(id)?.classList.contains('show')) closeModal(id);
    });
    if (editingEvalId) exitEditMode();
  }
});

document.getElementById('new-skill-input')?.addEventListener('keypress', e => {
  if (e.key === 'Enter') addSkill();
});
</script>
</body>
</html>
