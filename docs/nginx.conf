# Pilotes Academy — Skill Tracker
# nginx configuration for VPS deployment
#
# Usage:
#   1. Copy to /etc/nginx/sites-available/skill-tracker
#   2. ln -s /etc/nginx/sites-available/skill-tracker /etc/nginx/sites-enabled/
#   3. sudo certbot --nginx -d skill-tracker.les-pilotes.fr
#   4. sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name skill-tracker.les-pilotes.fr;

    # Redirect HTTP to HTTPS (Certbot will manage this)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name skill-tracker.les-pilotes.fr;

    # SSL certificates (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/skill-tracker.les-pilotes.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/skill-tracker.les-pilotes.fr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.supabase.co; img-src 'self' data:; font-src 'self';" always;

    # Frontend static files
    root /var/www/skill-tracker;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy to Python send-bilan endpoint
    location /send-bilan {
        proxy_pass http://127.0.0.1:8888;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout settings for email sending
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    # Block access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Logging
    access_log /var/log/nginx/skill-tracker.access.log;
    error_log  /var/log/nginx/skill-tracker.error.log;
}
