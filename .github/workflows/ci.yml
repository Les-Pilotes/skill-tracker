name: CI — Security & Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security-check:
    name: Check for hardcoded secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan Python files for hardcoded passwords
        run: |
          echo "Scanning .py files for hardcoded credentials..."
          FOUND=0
          # Look for common patterns: password=, passwd=, secret=, key= with literal values
          if grep -rn --include="*.py" -E "(password|passwd|secret)\s*[:=]\s*['\"][^'\"]{8,}" . \
             | grep -v '.env' | grep -v 'environ' | grep -v '_require_env' | grep -v '#'; then
            echo "::error::Potential hardcoded secrets found in Python files"
            FOUND=1
          fi
          # Look for raw connection strings with passwords
          if grep -rn --include="*.py" -E "postgresql://[^@]+:[^@]+@" . | grep -v '#'; then
            echo "::error::Hardcoded database connection string found"
            FOUND=1
          fi
          if [ "$FOUND" -eq 1 ]; then
            exit 1
          fi
          echo "No hardcoded secrets found in Python files."

      - name: Scan JS/HTML files for hardcoded secrets
        run: |
          echo "Scanning JS/HTML files for hardcoded credentials..."
          FOUND=0
          # Look for API keys, tokens, passwords in JS
          if grep -rn --include="*.js" --include="*.html" -E "(api_key|apikey|secret_key|password|token)\s*[:=]\s*['\"][^'\"]{16,}" . \
             | grep -v 'config.js' | grep -v 'placeholder' | grep -v '#' | grep -v '//'; then
            echo "::error::Potential hardcoded secrets found in JS/HTML files"
            FOUND=1
          fi
          if [ "$FOUND" -eq 1 ]; then
            exit 1
          fi
          echo "No hardcoded secrets found in JS/HTML files."

  env-var-check:
    name: Validate Edge Function env vars
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check env var names in Edge Functions
        run: |
          echo "Checking Edge Functions use correct env var names..."
          FOUND=0
          # SERVICE_ROLE_KEY without SUPABASE_ prefix is wrong
          if grep -rn "Deno.env.get.*['\"]SERVICE_ROLE_KEY['\"]" supabase/functions/; then
            echo "::error::Edge Function uses SERVICE_ROLE_KEY instead of SUPABASE_SERVICE_ROLE_KEY"
            FOUND=1
          fi
          if [ "$FOUND" -eq 1 ]; then
            exit 1
          fi
          echo "All env var names are correct."

  sql-validation:
    name: Validate SQL migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check SQL file syntax basics
        run: |
          echo "Validating SQL migration files..."
          ERRORS=0
          for f in supabase/migrations/*.sql; do
            echo "Checking $f..."
            # Ensure files are not empty
            if [ ! -s "$f" ]; then
              echo "::error file=$f::Empty migration file"
              ERRORS=1
              continue
            fi
            # Check for common SQL issues: unmatched parentheses
            OPEN=$(grep -o '(' "$f" | wc -l)
            CLOSE=$(grep -o ')' "$f" | wc -l)
            if [ "$OPEN" -ne "$CLOSE" ]; then
              echo "::error file=$f::Unmatched parentheses (open=$OPEN, close=$CLOSE)"
              ERRORS=1
            fi
            # Ensure migration files end with semicolon (ignoring comments and whitespace)
            LAST_STMT=$(grep -v '^\s*--' "$f" | grep -v '^\s*$' | tail -1)
            if ! echo "$LAST_STMT" | grep -q ';$'; then
              echo "::error file=$f::Migration does not end with a semicolon"
              ERRORS=1
            fi
          done
          if [ "$ERRORS" -eq 1 ]; then
            exit 1
          fi
          echo "All SQL migrations passed basic validation."

  html-lint:
    name: Basic HTML lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Check HTML structure
        run: |
          echo "Running basic HTML lint..."
          ERRORS=0
          for f in app/*.html; do
            echo "Checking $f..."
            # Check for DOCTYPE
            if ! head -5 "$f" | grep -qi 'doctype'; then
              echo "::warning file=$f::Missing DOCTYPE declaration"
            fi
            # Check for unclosed script tags
            OPEN_SCRIPT=$(grep -c '<script' "$f" || true)
            CLOSE_SCRIPT=$(grep -c '</script>' "$f" || true)
            if [ "$OPEN_SCRIPT" -ne "$CLOSE_SCRIPT" ]; then
              echo "::error file=$f::Unclosed <script> tags (open=$OPEN_SCRIPT, close=$CLOSE_SCRIPT)"
              ERRORS=1
            fi
            # Check for unclosed style tags
            OPEN_STYLE=$(grep -c '<style' "$f" || true)
            CLOSE_STYLE=$(grep -c '</style>' "$f" || true)
            if [ "$OPEN_STYLE" -ne "$CLOSE_STYLE" ]; then
              echo "::error file=$f::Unclosed <style> tags (open=$OPEN_STYLE, close=$CLOSE_STYLE)"
              ERRORS=1
            fi
          done
          if [ "$ERRORS" -eq 1 ]; then
            exit 1
          fi
          echo "HTML lint passed."

  pr-quality-check:
    name: PR quality check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [security-check, env-var-check, sql-validation, html-lint]
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Summarize PR checks
        uses: actions/github-script@v7
        with:
          script: |
            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.payload.pull_request.head.sha,
            });

            let body = '## PR Quality Check Results\n\n';
            body += '| Check | Status |\n';
            body += '|-------|--------|\n';

            const jobNames = ['Check for hardcoded secrets', 'Validate Edge Function env vars', 'Validate SQL migrations', 'Basic HTML lint'];
            for (const name of jobNames) {
              const check = checks.check_runs.find(c => c.name === name);
              const status = check ? (check.conclusion === 'success' ? 'PASS' : check.conclusion || 'running') : 'pending';
              const icon = status === 'PASS' ? ':white_check_mark:' : (status === 'running' || status === 'pending' ? ':hourglass:' : ':x:');
              body += `| ${name} | ${icon} ${status} |\n`;
            }

            body += '\n---\nGenerated by CI pipeline';

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: body,
            });

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [security-check, env-var-check, sql-validation]
    steps:
      - uses: actions/checkout@v4

      - name: Verify deployment prerequisites
        run: |
          echo "Checking deployment prerequisites..."
          FILES=("app/index.html" "app/login.html" "app/js/config.js" "app/js/auth.js" "supabase/migrations/001_schema.sql")
          for f in "${FILES[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              exit 1
            fi
          done
          for var in SUPABASE_URL SUPABASE_SERVICE_ROLE_KEY RESEND_API_KEY SUPABASE_DB_PASSWORD; do
            if ! grep -q "$var" .env.example; then
              echo "::error::.env.example is missing documentation for $var"
              exit 1
            fi
          done
          echo "Deployment prerequisites verified."

      - name: Deploy via SSH
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/claudeuser/skill-tracker
            git pull origin main
            sudo cp -r app/* /var/www/skill-tracker/
            echo "Deployed at $(date -u '+%Y-%m-%d %H:%M UTC')"

      - name: Deploy skipped (not configured)
        if: ${{ vars.DEPLOY_ENABLED != 'true' }}
        run: |
          echo "::notice::SSH deployment is not configured yet."
          echo "To enable auto-deploy, add these GitHub secrets:"
          echo "  - VPS_HOST: your VPS IP or hostname"
          echo "  - VPS_USER: SSH username (e.g., claudeuser)"
          echo "  - VPS_SSH_KEY: private SSH key for authentication"
          echo "Then set the repository variable DEPLOY_ENABLED=true"
          echo ""
          echo "Manual deployment: ssh into VPS and run:"
          echo "  cd /home/claudeuser/skill-tracker && git pull && sudo cp -r app/* /var/www/skill-tracker/"

      - name: Notify Discord
        if: ${{ vars.DEPLOY_ENABLED == 'true' && success() }}
        run: |
          if [ -n "${{ secrets.DISCORD_WEBHOOK_URL }}" ]; then
            curl -H "Content-Type: application/json" \
              -d "{\"content\": \"Deployed to production: ${{ github.event.head_commit.message }} — ${{ github.event.head_commit.url }}\"}" \
              "${{ secrets.DISCORD_WEBHOOK_URL }}"
          else
            echo "::notice::Discord webhook not configured. Add DISCORD_WEBHOOK_URL secret to enable notifications."
          fi
